spring.application.name=vector-sidecar-service
spring.profiles.default=local
management.endpoints.web.exposure.include=health,info

# Vector engine provisioning
vector.engine.qdrant.enabled=${SIDECAR_QDRANT_ENABLED:false}
vector.engine.qdrant.base-url=${SIDECAR_QDRANT_URL:http://127.0.0.1:6333}
vector.engine.qdrant.api-key=${SIDECAR_QDRANT_API_KEY:}
