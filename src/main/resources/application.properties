spring.application.name=vector-sidecar-service
spring.profiles.default=local
management.endpoints.web.exposure.include=health,info

# Vector engine provisioning
vector.engine.qdrant.enabled=${SIDECAR_QDRANT_ENABLED:true}
vector.engine.qdrant.base-url=${SIDECAR_QDRANT_URL:http://127.0.0.1:6333}
vector.engine.qdrant.api-key=${SIDECAR_QDRANT_API_KEY:}

# Vector data outbox worker. Insert API always writes outbox events for vector rows;
# enable this worker to asynchronously upsert them into the vector engine.
vector.outbox.worker.enabled=${SIDECAR_OUTBOX_WORKER_ENABLED:true}
vector.outbox.worker.fixed-delay-ms=${SIDECAR_OUTBOX_WORKER_FIXED_DELAY_MS:1000}
vector.outbox.worker.batch-size=${SIDECAR_OUTBOX_WORKER_BATCH_SIZE:50}
vector.outbox.worker.max-retries=${SIDECAR_OUTBOX_WORKER_MAX_RETRIES:5}
vector.outbox.worker.initial-retry-delay-ms=${SIDECAR_OUTBOX_WORKER_INITIAL_RETRY_DELAY_MS:1000}
vector.outbox.worker.max-retry-delay-ms=${SIDECAR_OUTBOX_WORKER_MAX_RETRY_DELAY_MS:60000}
vector.outbox.worker.lock-timeout-ms=${SIDECAR_OUTBOX_WORKER_LOCK_TIMEOUT_MS:60000}
