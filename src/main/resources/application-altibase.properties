# Altibase profile. Apply db/altibase/001_init_sidecar.sql before startup.
spring.datasource.url=${SIDECAR_DB_URL:jdbc:Altibase://192.168.1.111:20300/mydb}
spring.datasource.driver-class-name=Altibase.jdbc.driver.AltibaseDriver
spring.datasource.username=${SIDECAR_DB_USERNAME:sys}
spring.datasource.password=${SIDECAR_DB_PASSWORD:manager}

# Use DBA-managed schema in Altibase.
spring.sql.init.mode=never
